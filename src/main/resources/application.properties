spring.application.name=domus-server
server.port=${SERVER_PORT:8080}

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:domus_dev}
spring.datasource.username=${DB_USERNAME:domus_dev}
spring.datasource.password=${DB_PASSWORD:domus_dev}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

security.jwt.secret=${JWT_SECRET:RE9NVVNfREVWX1NFQ1JFVF9GT1JfSldUX1NFUlZJQ0VfQkFTRV9LRVlfMjAyNg==}
security.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:28800}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:8100,http://127.0.0.1:8100}
