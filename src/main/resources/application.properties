spring.application.name=domus-server

server.port=${SERVER_PORT:8080}
server.forward-headers-strategy=framework
server.error.include-stacktrace=never
server.error.include-message=never
server.shutdown=graceful

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:domus_dev}
spring.datasource.username=${DB_USERNAME:domus_dev}
spring.datasource.password=${DB_PASSWORD:domus_dev}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.validation-timeout=${DB_POOL_VALIDATION_TIMEOUT_MS:5000}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true

management.endpoints.web.exposure.include=${MANAGEMENT_EXPOSED_ENDPOINTS:health,info}
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

security.jwt.secret=${JWT_SECRET:RE9NVVNfREVWX1NFQ1JFVF9GT1JfSldUX1NFUlZJQ0VfQkFTRV9LRVlfMjAyNg==}
security.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:28800}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:8100,http://127.0.0.1:8100}
app.security.expose-docs=${APP_SECURITY_EXPOSE_DOCS:true}

logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.com.domus.server=${LOG_LEVEL_APP:INFO}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{correlationId:-n/a}] [%thread] %logger{36} - %msg%n
