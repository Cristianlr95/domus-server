spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

security.jwt.secret=${JWT_SECRET}

management.endpoints.web.exposure.include=${MANAGEMENT_EXPOSED_ENDPOINTS:health}
management.endpoint.health.show-details=never

app.security.expose-docs=${APP_SECURITY_EXPOSE_DOCS:false}
springdoc.api-docs.enabled=${APP_SECURITY_EXPOSE_DOCS:false}
springdoc.swagger-ui.enabled=${APP_SECURITY_EXPOSE_DOCS:false}
