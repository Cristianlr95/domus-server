services:
  postgres:
    image: postgres:16-alpine
    container_name: domus-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-domus_dev}
      POSTGRES_USER: ${DB_USERNAME:-domus_dev}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-domus_dev}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - domus_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-domus_dev} -d ${DB_NAME:-domus_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
    container_name: domus-server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-domus_dev}
      DB_USERNAME: ${DB_USERNAME:-domus_dev}
      DB_PASSWORD: ${DB_PASSWORD:-domus_dev}
      JWT_SECRET: ${JWT_SECRET:-RE9NVVNfREVWX1NFQ1JFVF9GT1JfSldUX1NFUlZJQ0VfQkFTRV9LRVlfMjAyNg==}
      JWT_EXPIRATION_SECONDS: ${JWT_EXPIRATION_SECONDS:-28800}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://localhost:8100,http://127.0.0.1:8100}
      APP_SECURITY_EXPOSE_DOCS: ${APP_SECURITY_EXPOSE_DOCS:-true}
      MANAGEMENT_EXPOSED_ENDPOINTS: ${MANAGEMENT_EXPOSED_ENDPOINTS:-health,info}
    ports:
      - "8080:8080"

volumes:
  domus_postgres_data:
